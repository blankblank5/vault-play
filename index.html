<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAULTPLAY — Free Online Games</title>
  <link rel="preconnect" href="https://googleapis.com" />
  <link rel="preconnect" href="https://gstatic.com" crossorigin />
  <link href="https://googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f0f0; --surface: #ffffff; --border: #e0e0e0; --border2: #d0d0d0;
      --text: #111111; --text3: #999999; --accent: #1a1a1a;
      --radius: 16px; --shadow: 0 2px 12px rgba(0,0,0,0.07); --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    header { position: sticky; top: 0; z-index: 100; background: rgba(240,240,240,0.85); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); padding: 0 32px; }
    .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 66px; gap: 20px; }
    .logo-text { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); text-decoration: none; }
    #search { width: 100%; max-width: 420px; padding: 10px 16px; border: 1px solid var(--border2); border-radius: 50px; background: var(--surface); outline: none; }
    .grid-section { padding: 40px 32px; max-width: 1400px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: 0.2s; box-shadow: var(--shadow); }
    .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
    .card-thumb { width: 100%; aspect-ratio: 16/10; position: relative; background: #eee; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 15px; }
    .card-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; width: 90%; max-width: 1000px; height: 80vh; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    iframe { flex: 1; border: none; width: 100%; height: 100%; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo-text" href="#">VAULTPLAY</a>
    <input id="search" type="text" placeholder="Search 22 games..." onkeyup="filterGames()">
  </div>
</header>

<div class="grid-section">
  <div class="grid" id="grid">
    <script>
      const games = [
        { file: '1v1.LoL.html', name: '1v1.LoL', img: '1v1.LoL.png' },
        { file: 'Basket Random.html', name: 'Basket Random', img: 'Basket_Random.png' },
        { file: 'BitLife.html', name: 'BitLife', img: 'BitLife.png' },
        { file: 'Bottle Jump 3D.html', name: 'Bottle Jump 3D', img: 'Bottle_Jump_3D.png' },
        { file: 'Bouncemasters.html', name: 'Bouncemasters', img: 'Bouncemasters.png' },
        { file: 'Bowmasters.html', name: 'Bowmasters', img: 'Bowmasters.png' },
        { file: 'Brotato.html', name: 'Brotato', img: 'Brotato.png' },
        { file: 'BuckshotRoulette.html', name: 'Buckshot Roulette', img: 'BuckshotRoulette.png' },
        { file: 'Clover Pit.html', name: 'Clover Pit', img: 'Clover_Pit.png' },
        { file: 'Cluster Rush.html', name: 'Cluster Rush', img: 'Cluster_Rush.png' },
        { file: 'Cookie Clicker.html', name: 'Cookie Clicker', img: 'Cookie_Clicker.png' },
        { file: 'Draw Climber.html', name: 'Draw Climber', img: 'Draw_Climber.png' },
        { file: 'Draw Joust.html', name: 'Draw Joust', img: 'Draw_Joust.png' },
        { file: 'FiveNightsatEpsteins.html', name: 'FNA Epsteins', img: 'FiveNightsatEpsteins.png' },
        { file: 'Kindergarten.html', name: 'Kindergarten', img: 'Kindergarten.png' },
        { file: 'Kindergarten2.html', name: 'Kindergarten 2', img: 'Kindergarten2.png' },
        { file: 'Kindergarten3.html', name: 'Kindergarten 3', img: 'Kindergarten3.png' },
        { file: 'Learn to Fly 3.html', name: 'Learn to Fly 3', img: 'Learn_to_Fly_3.png' },
        { file: 'Learn to Fly Idle.html', name: 'Learn to Fly Idle', img: 'Learn_to_Fly_Idle.png' },
        { file: 'Minecraft Beta 1.7.3.html', name: 'Minecraft Beta', img: 'Minecraft_Beta.png' },
        { file: 'People Playground.html', name: 'People Playground', img: 'People_Playground.png' },
        { file: 'Sandboxels.html', name: 'Sandboxels', img: 'Sandboxels.png' }
      ];

      const grid = document.getElementById('grid');
      games.forEach(g => {
        grid.innerHTML += `
          <div class="card" onclick="openGame('${g.file}', '${g.name}')">
            <div class="card-thumb"><img src="${g.img}" alt="${g.name}"></div>
            <div class="card-body"><div class="card-name">${g.name}</div></div>
          </div>`;
      });
    </script>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div id="modalTitle" style="font-weight:700">Game</div>
      <button onclick="closeGame()">Close</button>
    </div>
    <iframe id="gameFrame" src=""></iframe>
  </div>
</div>

<script>
  function openGame(file, name) {
    document.getElementById('modalTitle').innerText = name;
    document.getElementById('gameFrame').src = file;
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeGame() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('gameFrame').src = '';
    document.body.style.overflow = 'auto';
  }
  function filterGames() {
    let input = document.getElementById('search').value.toLowerCase();
    let cards = document.getElementsByClassName('card');
    for (let card of cards) {
      let name = card.querySelector('.card-name').innerText.toLowerCase();
      card.style.display = name.includes(input) ? "block" : "none";
    }
  }
</script>
</body>
</html>
